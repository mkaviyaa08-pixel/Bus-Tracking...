<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Vehicle Tracking</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        body { margin: 0; background-color: #0b0e14; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        #map { height: 100%; width: 100%; }
        /* Hide the default routing instruction panel to keep UI clean */
        .leaflet-routing-container { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const districts = {
            "Coimbatore": [11.0168, 76.9558],
            "Chennai": [13.0827, 80.2707],
            "Madurai": [9.9252, 78.1198],
            "Salem": [11.6643, 78.1460],
            "Trichy": [10.7905, 78.7047]
        };

        const LoginScreen = ({ onLogin }) => (
            <div className="h-screen w-full flex items-center justify-center bg-slate-900">
                <div className="bg-[#051c1c] p-10 rounded-lg shadow-2xl w-96 border border-slate-700">
                    <h2 className="text-center text-white font-bold mb-8 tracking-widest">USER LOGIN</h2>
                    <input type="text" placeholder="Username" className="w-full p-3 mb-4 rounded-full bg-slate-700 text-white outline-none" />
                    <input type="password" placeholder="Password" className="w-full p-3 mb-8 rounded-full bg-slate-700 text-white outline-none" />
                    <button onClick={onLogin} className="w-full bg-white text-black font-bold py-3 rounded-full hover:bg-gray-200 transition">LOGIN</button>
                </div>
            </div>
        );

        const SearchScreen = ({ onSearch }) => {
            const [to, setTo] = useState("Chennai");
            return (
                <div className="h-screen w-full flex items-center justify-center bg-slate-800 relative">
                    <div className="relative glass p-10 rounded-3xl text-center shadow-2xl border border-white/10 w-[400px]">
                        <h1 className="text-2xl font-bold mb-2">🚌 Vehicle Tracking</h1>
                        <p className="text-gray-300 mb-6 text-sm">Route from Your Location</p>
                        <div className="text-left mb-6">
                            <label className="text-xs text-gray-400 ml-4">To Destination</label>
                            <select value={to} onChange={(e) => setTo(e.target.value)} className="w-full p-3 mt-1 rounded-full bg-white text-black appearance-none">
                                {Object.keys(districts).map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>
                        <button onClick={() => onSearch(to)} className="w-full bg-yellow-400 text-black font-bold py-3 rounded-full hover:bg-yellow-500 transition">Track Bus</button>
                    </div>
                </div>
            );
        };

        const LoadingScreen = () => (
            <div className="h-screen w-full flex flex-col items-center justify-center bg-[#0b0e14]">
                <div className="text-4xl mb-4 animate-bounce">🚌</div>
                <h2 className="text-3xl font-black italic tracking-tighter text-white">Calculating Route</h2>
                <div className="w-48 h-1 bg-gray-700 mt-4 overflow-hidden relative rounded-full">
                    <div className="absolute inset-0 bg-orange-500 animate-[pulse_1.5s_infinite]"></div>
                </div>
            </div>
        );

        const MapScreen = ({ destination, onBack }) => {
            const [routeData, setRouteData] = useState({ distance: 'Calculating...', time: 'Calculating...' });

            useEffect(() => {
                const map = L.map('map').setView([20, 78], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                // Get Current Location
                navigator.geolocation.getCurrentPosition((position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    const destCoords = districts[destination];

                    const control = L.Routing.control({
                        waypoints: [
                            L.latLng(userLat, userLng),
                            L.latLng(destCoords[0], destCoords[1])
                        ],
                        lineOptions: { styles: [{ color: '#f97316', weight: 5 }] },
                        createMarker: function(i, wp) {
                            return L.marker(wp.latLng, {
                                icon: L.divIcon({ 
                                    html: i === 0 ? '📍' : '🏁', 
                                    className: 'text-2xl', 
                                    iconSize: [30, 30] 
                                })
                            });
                        }
                    }).addTo(map);

                    control.on('routesfound', function(e) {
                        const routes = e.routes;
                        const summary = routes[0].summary;
                        setRouteData({
                            distance: (summary.totalDistance / 1000).toFixed(1) + ' km',
                            time: Math.round(summary.totalTime / 60) + ' min'
                        });
                    });
                }, () => alert("Please enable Location Services"));

                return () => map.remove();
            }, [destination]);

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    {/* LEFT SIDE: DATA */}
                    <div className="w-1/3 bg-[#111318] border-r border-white/10 flex flex-col p-6 custom-scrollbar overflow-y-auto">
                        <button onClick={onBack} className="text-gray-400 hover:text-white mb-6">← Back</button>
                        <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-6">Live Stats</h2>
                        
                        <div className="space-y-4">
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400">DESTINATION</p>
                                <p className="text-lg font-bold text-orange-400">{destination}</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                    <p className="text-[10px] text-gray-400">DISTANCE</p>
                                    <p className="text-lg font-bold">{routeData.distance}</p>
                                </div>
                                <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                    <p className="text-[10px] text-gray-400">EST. TIME</p>
                                    <p className="text-lg font-bold">{routeData.time}</p>
                                </div>
                            </div>
                        </div>

                        <div className="mt-10">
                            <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Journey Progress</h2>
                            <div className="relative border-l border-slate-700 ml-2 pl-6 space-y-6">
                                <div className="relative"><div className="absolute -left-[30px] w-4 h-4 bg-green-500 rounded-full border-4 border-[#111318]"></div><p className="text-sm">Current Location</p></div>
                                <div className="relative"><div className="absolute -left-[30px] w-4 h-4 bg-blue-500 rounded-full border-4 border-[#111318]"></div><p className="text-sm">En Route...</p></div>
                                <div className="relative opacity-50"><div className="absolute -left-[30px] w-4 h-4 bg-gray-500 rounded-full border-4 border-[#111318]"></div><p className="text-sm">{destination} Station</p></div>
                            </div>
                        </div>
                    </div>

                    {/* RIGHT SIDE: MAP */}
                    <div className="w-2/3 relative">
                        <div id="map"></div>
                        <div className="absolute bottom-4 right-4 z-[1000] bg-black/60 px-4 py-2 rounded-full text-[10px]">
                            Live GPS Active
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('login');
            const [dest, setDest] = useState('');

            const handleLogin = () => setView('search');
            const handleSearch = (to) => {
                setDest(to);
                setView('loading');
                setTimeout(() => setView('map'), 1500);
            };

            switch(view) {
                case 'login': return <LoginScreen onLogin={handleLogin} />;
                case 'search': return <SearchScreen onSearch={handleSearch} />;
                case 'loading': return <LoadingScreen />;
                case 'map': return <MapScreen destination={dest} onBack={() => setView('search')} />;
                default: return <LoginScreen />;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
